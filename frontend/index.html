<!DOCTYPE html>
<html>
<head>
  <title>Inventory Search</title>
</head>
<body>

  <h2>Inventory Search</h2>

  <input id="search" placeholder="Search product" />
  
  <select id="category">
    <option value="">All Categories</option>
    <option>Electronics</option>
    <option>Fashion</option>
    <option>Accessories</option>
  </select>

  <input id="minPrice" placeholder="Min Price" type="number"/>
  <input id="maxPrice" placeholder="Max Price" type="number"/>

  <button onclick="search()">Search</button>

  <h3>Results:</h3>
  <div id="results"></div>

  <script>
    async function search() {
      console.log("Button clicked");

      const q = document.getElementById("search").value;
      const category = document.getElementById("category").value;
      const minPrice = document.getElementById("minPrice").value;
      const maxPrice = document.getElementById("maxPrice").value;

      const url = `http://localhost:5000/search?q=${q}&category=${category}&minPrice=${minPrice}&maxPrice=${maxPrice}`;

      const res = await fetch(url);
      const data = await res.json();

      const div = document.getElementById("results");
      div.innerHTML = "";

      if (data.length === 0) {
        div.innerHTML = "No results found";
        return;
      }

      data.forEach(item => {
        div.innerHTML += `<p>${item.product_name} - ₹${item.price} (${item.category})</p>`;
      });
    }
  </script>

</body>
</html>
